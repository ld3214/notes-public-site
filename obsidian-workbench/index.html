<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Obsidian Workbench - ASIC/DV Notes</title>
  <link rel="stylesheet" href="./styles.css">
  <script defer src="./app.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="vault-panel">
      <header class="vault-header">
        <a class="brand" href="./index.html" aria-label="Obsidian Workbench">
          <span class="brand-mark">OW</span>
          <span>
            <strong>Obsidian Workbench</strong>
            <small>ASIC/DV notes</small>
          </span>
        </a>
        <button class="icon-button" id="themeButton" type="button" title="切换主题" aria-label="切换主题">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a7 7 0 1 0 7 7 5.5 5.5 0 0 1-7-7Z"/></svg>
        </button>
      </header>

      <div class="vault-actions">
        <button class="primary-button" id="openFolderButton" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5v-10Z"/></svg>
          <span>打开笔记文件夹</span>
        </button>
        <label class="search-field">
          <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="fileSearch" type="search" autocomplete="off" placeholder="搜索 Markdown">
        </label>
      </div>

      <nav class="file-tree" id="fileTree" aria-label="Markdown 文件"></nav>
    </aside>

    <main class="workspace">
      <header class="workspace-header">
        <div class="file-heading">
          <span class="dirty-dot" id="dirtyDot" aria-hidden="true"></span>
          <div>
            <h1 id="fileTitle">未选择文件</h1>
            <p id="filePath">选择 notes 文件夹后开始编辑</p>
          </div>
        </div>

        <div class="workspace-tools">
          <div class="segmented" role="tablist" aria-label="视图模式">
            <button class="segment active" type="button" data-mode="split">分屏</button>
            <button class="segment" type="button" data-mode="edit">源码</button>
            <button class="segment" type="button" data-mode="preview">预览</button>
            <button class="segment" type="button" data-mode="blocks">整理</button>
          </div>
          <button class="icon-button" id="saveButton" type="button" title="保存" aria-label="保存" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 4h12l2 2v14H5V4Z"/><path d="M8 4v6h8V4"/><path d="M8 20v-6h8v6"/></svg>
          </button>
          <button class="icon-button" id="revertButton" type="button" title="恢复到上次保存" aria-label="恢复到上次保存" disabled>
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7v5h5"/><path d="M5 12a7 7 0 1 0 2-5"/></svg>
          </button>
        </div>
      </header>

      <section class="notice" id="apiNotice" hidden>
        当前浏览器不能直接读写本地文件夹。请用新版 Chrome 或 Edge 打开本页面。
      </section>

      <section class="editor-layout" id="editorLayout" data-mode="split">
        <textarea id="markdownEditor" spellcheck="false" aria-label="Markdown 源码"></textarea>
        <article class="preview-pane markdown-preview" id="previewPane" aria-label="Markdown 预览"></article>
        <section class="blocks-pane" id="blocksPane" aria-label="块整理器" hidden>
          <div class="blocks-toolbar">
            <div>
              <strong>块整理</strong>
              <small id="blockCount">0 blocks</small>
            </div>
            <button class="ghost-button" id="addBlockButton" type="button">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
              <span>新增块</span>
            </button>
          </div>
          <div class="block-list" id="blockList"></div>
        </section>
      </section>
    </main>

    <aside class="inspector-panel">
      <section class="panel-section">
        <div class="panel-title">Outline</div>
        <nav class="outline-list" id="outlineList"></nav>
      </section>
      <section class="panel-section">
        <div class="panel-title">Stats</div>
        <dl class="stats-list">
          <div><dt>Files</dt><dd id="statFiles">0</dd></div>
          <div><dt>Blocks</dt><dd id="statBlocks">0</dd></div>
          <div><dt>Chars</dt><dd id="statChars">0</dd></div>
        </dl>
      </section>
      <section class="panel-section">
        <div class="panel-title">Status</div>
        <p class="status-text" id="statusText">Ready</p>
      </section>
    </aside>
  </div>

  <template id="blockTemplate">
    <article class="block-card" draggable="true">
      <div class="block-toolbar">
        <button class="drag-handle" type="button" title="拖动排序" aria-label="拖动排序">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5h.01"/><path d="M15 5h.01"/><path d="M9 12h.01"/><path d="M15 12h.01"/><path d="M9 19h.01"/><path d="M15 19h.01"/></svg>
        </button>
        <span class="block-type"></span>
        <div class="format-buttons" aria-label="格式">
          <button type="button" data-format="paragraph" title="段落">¶</button>
          <button type="button" data-format="bullet" title="无序要点">•</button>
          <button type="button" data-format="ordered" title="有序要点">1.</button>
          <button type="button" data-format="quote" title="引用">&gt;</button>
          <button type="button" data-format="h2" title="二级标题">H2</button>
          <button type="button" data-format="h3" title="三级标题">H3</button>
        </div>
        <div class="block-actions">
          <button type="button" data-action="up" title="上移" aria-label="上移">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 15 6-6 6 6"/></svg>
          </button>
          <button type="button" data-action="down" title="下移" aria-label="下移">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg>
          </button>
          <button type="button" data-action="delete" title="删除" aria-label="删除">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 7h16"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M6 7l1 14h10l1-14"/><path d="M9 7V4h6v3"/></svg>
          </button>
        </div>
      </div>
      <textarea class="block-editor" spellcheck="false"></textarea>
    </article>
  </template>
</body>
</html>
