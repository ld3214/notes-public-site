wc7sWle0pqyV3wFJSkgc4G9x8dtREwiOxd5E1kmlRihaE15vyaVE"};
    const sessionKey = "notes-site-password-v1";
    const form = document.getElementById("unlock-form");
    const input = document.getElementById("password");
    const button = document.getElementById("unlock-button");
    const error = document.getElementById("error");
    const encoder = new TextEncoder();
    const decoder = new TextDecoder();

    function fromBase64(value) {
      const binary = atob(value);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
      return bytes;
    }

    async function decrypt(password) {
      const keyMaterial = await crypto.subtle.importKey(
        "raw",
        encoder.encode(password),
        "PBKDF2",
        false,
        ["deriveKey"]
      );
      const key = await crypto.subtle.deriveKey(
        { name: "PBKDF2", salt: fromBase64(payload.salt), iterations: payload.iterations, hash: "SHA-256" },
        keyMaterial,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
      );
      const plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: fromBase64(payload.iv), additionalData: encoder.encode(payload.path) },
        key,
        fromBase64(payload.data)
      );
      return decoder.decode(plain);
    }

    async function unlock(password, fromSession) {
      if (!password) return;
      button.disabled = true;
      error.hidden = true;
      try {
        const html = await decrypt(password);
        try { sessionStorage.setItem(sessionKey, password); } catch (e) {}
        document.open();
        document.write(html);
        document.close();
      } catch (e) {
        if (fromSession) {
          try { sessionStorage.removeItem(sessionKey); } catch (_) {}
        }
        error.hidden = false;
        button.disabled = false;
        input.focus();
        input.select();
      }
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      unlock(input.value, false);
    });

    try {
      const remembered = sessionStorage.getItem(sessionKey);
      if (remembered) unlock(remembered, true);
    } catch (e) {}
  </script>
